<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>KB Task 1</title>
        <link rel="stylesheet" href="css/task1.css">
        <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
        <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
        <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    </head>
    <body>
        <div id="app"></div>
        <script type="text/babel">
            const CardFilm = ({name, year, image}) => {
                        return (<div className="cardDiv">
                        <h2>{name}</h2>
                        <p>{year}</p>
                        <img src={image} alt={name}/>
                        </div>)
                    }
                    const root = ReactDOM.createRoot(document.getElementById('app'));
                    root.render(
                        <div className="container">
                            <CardFilm name='Whiplash' year={2014}
                            image='https://upload.wikimedia.org/wikipedia/ru/thumb/0/01/Whiplash_poster.jpg/250px-Whiplash_poster.jpg'/>
                            <CardFilm name='Knockin’ On Heaven’s Door' year={1997}
                            image='https://upload.wikimedia.org/wikipedia/ru/thumb/b/b9/Knockin%27_On_Heaven%27s_Door.jpg/250px-Knockin%27_On_Heaven%27s_Door.jpg'/>
                            <CardFilm name='Full Metal Jacket' year={1988}
                            image='https://upload.wikimedia.org/wikipedia/ru/thumb/e/ef/Full_Metal_Jacket_1987.jpg/250px-Full_Metal_Jacket_1987.jpg'/>
                        </div>
                    );
                </script>
    </body>
</html>
